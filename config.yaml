# 员工离职数据分析系统 - 配置文件

app:
  title: "员工离职数据分析系统"
  description: "自动化离职率分析与AI智能洞察"
  page_icon: "📊"

# AI配置 - Groq免费API
ai:
  provider: "groq"
  model: "llama-3.3-70b-versatile"  # 免费高速模型
  api_key: ""  # 用户需要在Groq官网免费获取: https://console.groq.com/
  temperature: 0.3
  max_tokens: 2000

# 数据库配置
database:
  path: "data/attrition.db"

# 离职率计算规则
attrition:
  formula:
    monthly_rate: "departure_count / avg_headcount * 100"
    avg_headcount: "(start_headcount + end_headcount) / 2"

# 司龄区间定义
tenure:
  ranges:
    - name: "新人"
      min: 0
      max: 0.5
      label: "0-0.5年"
    - name: "初级"
      min: 0.5
      max: 1
      label: "0.5-1年"
    - name: "中坚"
      min: 1
      max: 3
      label: "1-3年"
    - name: "资深"
      min: 3
      max: 5
      label: "3-5年"
    - name: "专家"
      min: 5
      max: 100
      label: "5年以上"

# 图表配色方案
chart:
  colors:
    primary: "#4F46E5"
    secondary: "#10B981"
    accent: "#F59E0B"
    danger: "#EF4444"
    info: "#3B82F6"
    warning: "#F97316"
    purple: "#8B5CF6"
    pink: "#EC4899"

# 导出配置
export:
  excel:
    filename_prefix: "离职分析报告"
  pdf:
    filename_prefix: "离职分析报告"
    page_size: "A4"

# 部署配置
deployment:
  platform: "streamlit-cloud"
  repository: ""  # GitHub仓库地址
